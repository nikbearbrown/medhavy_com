<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Radial Bar Chart | Medhavy</title>
<meta name="description" content="Bars arranged around a central point, each extending outward. An eye-catching alternative to a conventional bar chart for cyclic or part-to-whole data.">
<meta name="keywords" content="radial bar chart, circular bar, D3, data visualization">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Radial Bar Chart</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680";
const data=[
  {k:"Language",v:87},{k:"Memory",v:94},{k:"Patterns",v:96},{k:"Logic",v:82},
  {k:"Creativity",v:68},{k:"Empathy",v:40},{k:"Embodied",v:28},{k:"Judgment",v:45}
];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const cx=W/2,cy=H/2+10,rMin=50,rMax=Math.min(W,H)*.38;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  svg.append("text").attr("x",cx).attr("y",28).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("AI capability scores by domain — bar length encodes score, color encodes magnitude");
  const n=data.length,pieW=(2*Math.PI/n)*.82;
  const angle=i=>i*2*Math.PI/n-Math.PI/2;
  const r=d3.scaleLinear().domain([0,100]).range([rMin,rMax]);
  const col=d3.scaleSequential().domain([25,100]).interpolator(t=>d3.interpolateRgb("#9C9680","#8B0000")(t));
  // Grid rings
  [25,50,75,100].forEach(v=>{
    svg.append("circle").attr("cx",cx).attr("cy",cy).attr("r",r(v))
      .attr("fill","none").attr("stroke",dark?"rgba(255,255,255,.07)":"rgba(0,0,0,.07)").attr("stroke-width",1);
  });
  data.forEach((d,i)=>{
    const a=angle(i);
    const arc=d3.arc().innerRadius(rMin).outerRadius(r(d.v))
      .startAngle(a-pieW/2).endAngle(a+pieW/2).cornerRadius(4);
    svg.append("path").attr("transform","translate("+cx+","+cy+")").attr("d",arc())
      .attr("fill",col(d.v)).attr("opacity",.85);
    const lx=cx+(rMax+28)*Math.cos(a),ly=cy+(rMax+28)*Math.sin(a);
    svg.append("text").attr("x",lx).attr("y",ly+4).attr("text-anchor","middle")
      .attr("font-size",11).attr("fill",fg).text(d.k);
    svg.append("text").attr("x",lx).attr("y",ly+17).attr("text-anchor","middle")
      .attr("font-size",10).attr("fill",mu).text(d.v);
  });
}
draw();window.addEventListener("resize",draw);
</script></body></html>
