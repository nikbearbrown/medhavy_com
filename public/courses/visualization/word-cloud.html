<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Word Cloud | Medhavy</title>
<meta name="description" content="Words positioned and sized by frequency or importance. A quick visual summary of term prominence in a corpus — best for orientation, not precision.">
<meta name="keywords" content="word cloud, text visualization, frequency, prominence, D3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Word Cloud</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",bg=dark?"#0D0D0D":"#E8E0D0";
const words=[
  {t:"Irreducibly Human",w:100},{t:"Boondoggling",w:85},{t:"Plausibility Auditing",w:78},
  {t:"Problem Formulation",w:75},{t:"Solve-Verify Asymmetry",w:72},{t:"Tool Orchestration",w:68},
  {t:"Interpretive Judgment",w:65},{t:"Executive Integration",w:62},{t:"Claude",w:58},
  {t:"Supervisory Capacity",w:54},{t:"SDD",w:50},{t:"Causal Reasoning",w:48},
  {t:"Embodied Teaching",w:46},{t:"Moral Imagination",w:44},{t:"BotSpeak",w:42},
  {t:"AImagineering",w:40},{t:"Hallucination",w:38},{t:"Domain Knowledge",w:36},
  {t:"Accountability",w:34},{t:"Context",w:32},{t:"Verification",w:30},{t:"Ethics",w:28},
  {t:"Mentorship",w:26},{t:"Pattern Recognition",w:24},{t:"Creativity",w:22},
  {t:"Empathy",w:20},{t:"Minions",w:18},{t:"Handoff",w:16},{t:"Gru",w:15},{t:"Pearl",w:14}
];
const palette=["#8B0000","#8B7536","#6B6B5E","#4A4A4A","#9C9680"];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  svg.append("text").attr("x",W/2).attr("y",28).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Key terms from the Irreducibly Human curriculum — size encodes conceptual centrality");
  const fScale=d3.scaleLinear().domain([14,100]).range([11,Math.min(W,H)*.07]);
  const placed=[];
  function overlaps(x,y,w,h){
    for(const p of placed){
      if(Math.abs(x-p.x)<(w+p.w)/2+8&&Math.abs(y-p.y)<(h+p.h)/2+8)return true;
    }
    return false;
  }
  const cx=W/2,cy=H/2+10;
  words.forEach((word,wi)=>{
    const fs=fScale(word.w),charW=fs*.6,textW=word.t.length*charW,textH=fs*1.2;
    let placed_=false;
    for(let spiral=0;spiral<500&&!placed_;spiral++){
      const angle=spiral*.4,r=spiral*2.5;
      const tx=cx+r*Math.cos(angle),ty=cy+r*Math.sin(angle);
      if(tx-textW/2<10||tx+textW/2>W-10||ty-textH/2<40||ty+textH/2>H-10)continue;
      if(!overlaps(tx,ty,textW,textH)){
        placed.push({x:tx,y:ty,w:textW,h:textH});
        svg.append("text").attr("x",tx).attr("y",ty+fs*.35).attr("text-anchor","middle")
          .attr("font-size",fs).attr("font-weight",word.w>70?"500":"400")
          .attr("fill",palette[wi%palette.length]).attr("opacity",.85+word.w*.0015)
          .text(word.t);
        placed_=true;
      }
    }
  });
}
draw();window.addEventListener("resize",draw);
</script></body></html>
