<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stream Graph | Medhavy</title>
<meta name="description" content="A stacked area chart centered on a baseline, producing a flowing, river-like shape. Emphasizes change over time across multiple categories.">
<meta name="keywords" content="stream graph, stacked area, flowing, D3, time series">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Stream Graph</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
const keys=["Problem Formulation","Plausibility Auditing","Tool Orchestration","Interpretive Judgment","Executive Integration"];
const palette=["#8B0000","#8B7536","#6B6B5E","#4A4A4A","#9C9680"];
const n=20;
function smooth(arr,sigma=1.5){
  const out=[];
  for(let i=0;i<arr.length;i++){
    let sum=0,w=0;
    for(let j=-3;j<=3;j++){
      if(i+j<0||i+j>=arr.length)continue;
      const wt=Math.exp(-j*j/(2*sigma*sigma));
      sum+=arr[i+j]*wt;w+=wt;
    }
    out.push(sum/w);
  }
  return out;
}
const raw=keys.map((_,ki)=>{
  const base=Array.from({length:n},(_,i)=>{
    const t=i/n;
    return 5+Math.random()*15+Math.sin(t*Math.PI*(1+ki*.5))*10+t*(ki===0?12:ki===2?8:4);
  });
  return smooth(base);
});
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:210,b:40,l:40};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const data=d3.range(n).map(i=>({i,...Object.fromEntries(keys.map((k,ki)=>[ki,raw[ki][i]]))}));
  const stack=d3.stack().keys(d3.range(keys.length)).offset(d3.stackOffsetWiggle).order(d3.stackOrderInsideOut);
  const series=stack(data);
  const x=d3.scaleLinear().domain([0,n-1]).range([0,iW]);
  const allVals=series.flatMap(s=>s.flatMap(d=>d));
  const y=d3.scaleLinear().domain([d3.min(allVals),d3.max(allVals)]).range([iH,0]);
  const area=d3.area().x(d=>x(d.data.i)).y0(d=>y(d[0])).y1(d=>y(d[1])).curve(d3.curveCatmullRom.alpha(.5));
  series.forEach((s,i)=>{
    g.append("path").datum(s).attr("d",area).attr("fill",palette[i]).attr("opacity",.82);
  });
  // Label at end of each stream
  series.forEach((s,i)=>{
    const last=s[s.length-1];
    const midY=(y(last[0])+y(last[1]))/2;
    if(Math.abs(y(last[1])-y(last[0]))>14){
      svg.append("text").attr("x",m.l+iW+8).attr("y",m.t+midY+4)
        .attr("font-size",10).attr("fill",fg).text(keys[i].split(" ")[0]);
    }
  });
  svg.append("text").attr("x",(W-m.r+m.l)/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Supervisory capacity usage over time — stream width encodes volume, wiggle baseline reduces visual bias");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
