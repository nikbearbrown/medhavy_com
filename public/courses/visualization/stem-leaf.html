<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stem & Leaf Plot | Medhavy</title>
<meta name="description" content="A textual display of data distribution retaining exact values. The stem groups values by leading digit; leaves show individual data points.">
<meta name="keywords" content="stem and leaf plot, distribution, statistics, textual, D3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Stem & Leaf Plot</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",bg=dark?"#0D0D0D":"#E8E0D0";
const rawData=[42,45,47,51,53,55,55,57,58,59,62,63,65,67,68,70,71,73,75,76,78,80,82,85,87,88,91,93,96,98];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  svg.append("text").attr("x",W/2).attr("y",28).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu)
    .text("Score distribution — stem = tens digit, leaves = units digits");
  const stems={};
  rawData.forEach(v=>{const s=Math.floor(v/10)*10;if(!stems[s])stems[s]=[];stems[s].push(v%10);});
  const sKeys=Object.keys(stems).map(Number).sort((a,b)=>a-b);
  const lineH=Math.min(44,(H-80)/sKeys.length);
  const stemX=W/2-40;
  sKeys.forEach((s,i)=>{
    const y=80+i*lineH;
    // Stem
    svg.append("rect").attr("x",stemX-2).attr("y",y-lineH*.45).attr("width",44).attr("height",lineH*.9)
      .attr("fill",dark?"#1a1a1a":"#D3D1C7").attr("rx",4);
    svg.append("text").attr("x",stemX+20).attr("y",y+5).attr("text-anchor","middle")
      .attr("font-size",Math.min(16,lineH*.6)).attr("font-weight","500").attr("fill","#8B0000").text(s);
    // Divider
    svg.append("line").attr("x1",stemX+44).attr("x2",stemX+46).attr("y1",y-lineH*.45).attr("y2",y+lineH*.45)
      .attr("stroke",mu).attr("stroke-width",2);
    // Leaves
    stems[s].forEach((leaf,li)=>{
      svg.append("text").attr("x",stemX+56+li*18).attr("y",y+5).attr("text-anchor","middle")
        .attr("font-size",Math.min(14,lineH*.55)).attr("fill",fg).text(leaf);
    });
    // Left side count
    svg.append("text").attr("x",stemX-14).attr("y",y+5).attr("text-anchor","end")
      .attr("font-size",10).attr("fill",mu).text("("+stems[s].length+")");
  });
  // Key
  svg.append("text").attr("x",W/2).attr("y",H-20).attr("text-anchor","middle")
    .attr("font-size",11).attr("fill",mu).text("Key: stem | leaf = value, e.g. 7 | 5 = 75");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
