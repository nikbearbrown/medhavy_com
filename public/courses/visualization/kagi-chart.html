<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kagi Chart | Medhavy</title>
<meta name="description" content="A Japanese chart type that filters noise by reversing direction only when price moves beyond a threshold. Focuses on significant turning points.">
<meta name="keywords" content="kagi chart, financial, trend, reversal, D3, price chart">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Kagi Chart</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
const raw=[42,44,41,43,45,48,46,50,52,49,51,55,53,57,60,58,62,65,63,67,64,68,70,72,75,71,73,77,80,78];
function makeKagi(data,rev=3){
  const lines=[];let dir=1,cur=data[0],seg=[{x:0,y:cur}];
  for(let i=1;i<data.length;i++){
    const p=data[i],chg=p-cur;
    if(dir===1&&chg<=-rev){dir=-1;seg.push({x:i,y:cur});lines.push({seg:[...seg],up:true});seg=[{x:i,y:cur}];}
    else if(dir===-1&&chg>=rev){dir=1;seg.push({x:i,y:cur});lines.push({seg:[...seg],up:false});seg=[{x:i,y:cur}];}
    cur=p;seg.push({x:i,y:p});
  }
  lines.push({seg,up:dir===1});return lines;
}
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:40,b:60,l:60};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scaleLinear().domain([0,raw.length-1]).range([0,iW]);
  const y=d3.scaleLinear().domain([d3.min(raw)-5,d3.max(raw)+5]).range([iH,0]);
  y.ticks(6).forEach(t=>{g.append("line").attr("x1",0).attr("x2",iW).attr("y1",y(t)).attr("y2",y(t)).attr("stroke",gridC).attr("stroke-width",1);});
  const lines=makeKagi(raw);
  lines.forEach(seg=>{
    const col=seg.up?"#8B0000":"#8B7536";
    const line=d3.line().x(d=>x(d.x)).y(d=>y(d.y));
    g.append("path").datum(seg.seg).attr("d",line).attr("fill","none").attr("stroke",col).attr("stroke-width",2.5);
  });
  g.append("g").attr("transform","translate(0,"+iH+")").call(d3.axisBottom(x).ticks(8).tickFormat(d=>"T"+d)).call(a=>{a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",10);a.selectAll(".tick line").attr("stroke",mu);});
  g.append("g").call(d3.axisLeft(y).ticks(6)).call(a=>{a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").attr("stroke",mu);});
  svg.append("text").attr("x",W/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Kagi chart — direction reverses only when price exceeds a threshold; red = rising, brass = falling");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
