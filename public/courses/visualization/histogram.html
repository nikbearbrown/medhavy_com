<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Histogram | Medhavy</title>
<meta name="description" content="Displays the distribution of a continuous variable by grouping values into bins. Reveals shape, spread, skew, and modality.">
<meta name="keywords" content="histogram, distribution, frequency, bins, D3, statistics">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Histogram</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
function rnd(m,s){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
const data1=Array.from({length:300},()=>rnd(72,12)).filter(v=>v>=30&&v<=100);
const data2=Array.from({length:200},()=>rnd(51,10)).filter(v=>v>=30&&v<=100);
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:120,b:60,l:60};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scaleLinear().domain([30,100]).range([0,iW]);
  const bins1=d3.bin().domain([30,100]).thresholds(20)(data1);
  const bins2=d3.bin().domain([30,100]).thresholds(20)(data2);
  const maxY=Math.max(d3.max(bins1,d=>d.length),d3.max(bins2,d=>d.length));
  const y=d3.scaleLinear().domain([0,maxY]).range([iH,0]);
  y.ticks(5).forEach(t=>{
    g.append("line").attr("x1",0).attr("x2",iW).attr("y1",y(t)).attr("y2",y(t)).attr("stroke",gridC).attr("stroke-width",1);
  });
  bins1.forEach(b=>{
    g.append("rect").attr("x",x(b.x0)+1).attr("y",y(b.length)).attr("width",Math.max(0,x(b.x1)-x(b.x0)-2))
      .attr("height",iH-y(b.length)).attr("fill","#8B0000").attr("opacity",.65).attr("rx",2);
  });
  bins2.forEach(b=>{
    g.append("rect").attr("x",x(b.x0)+1).attr("y",y(b.length)).attr("width",Math.max(0,x(b.x1)-x(b.x0)-2))
      .attr("height",iH-y(b.length)).attr("fill","#8B7536").attr("opacity",.5).attr("rx",2);
  });
  g.append("g").attr("transform","translate(0,"+iH+")").call(d3.axisBottom(x).ticks(8)).call(a=>{
    a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").attr("stroke",mu);
  });
  g.append("g").call(d3.axisLeft(y).ticks(5)).call(a=>{
    a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").attr("stroke",mu);
  });
  [["AI performance",0,"#8B0000"],["Human performance",1,"#8B7536"]].forEach(([l,i,c])=>{
    svg.append("rect").attr("x",W-m.r+10).attr("y",m.t+i*22).attr("width",12).attr("height",12).attr("fill",c).attr("rx",2).attr("opacity",.7);
    svg.append("text").attr("x",W-m.r+28).attr("y",m.t+i*22+10).attr("font-size",11).attr("fill",fg).text(l);
  });
  svg.append("text").attr("x",(W-m.r+m.l)/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Score distributions — bin height = frequency count");
  g.append("text").attr("x",iW/2).attr("y",iH+46).attr("text-anchor","middle").attr("font-size",11).attr("fill",fg).text("Score");
  g.append("text").attr("x",-iH/2).attr("y",-42).attr("transform","rotate(-90)").attr("text-anchor","middle").attr("font-size",11).attr("fill",fg).text("Count");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
