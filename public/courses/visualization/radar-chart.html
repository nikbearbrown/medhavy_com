<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Radar Chart | Medhavy</title>
<meta name="description" content="A spider chart showing multivariate data radiating from a central point. Good for comparing two or three entities across the same dimensions.">
<meta name="keywords" content="radar chart, spider chart, multivariate, comparison, D3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Radar Chart</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.08)":"rgba(0,0,0,.1)";
const dims=["Pattern
Recognition","Language
Fluency","Causal
Reasoning","Moral
Judgment","Creative
Synthesis","Embodied
Teaching"];
const human=[78,82,72,88,80,92];
const ai=[96,93,58,42,68,15];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.35;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  svg.append("text").attr("x",cx).attr("y",28).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Human vs AI capability profile — human excels in moral and embodied domains");
  const n=dims.length;
  const angle=i=>i*2*Math.PI/n-Math.PI/2;
  // Grid circles
  [.25,.5,.75,1].forEach(t=>{
    const pts=d3.range(n).map(i=>[cx+R*t*Math.cos(angle(i)),cy+R*t*Math.sin(angle(i))]);
    svg.append("polygon").attr("points",pts.map(p=>p.join(",")).join(" "))
      .attr("fill","none").attr("stroke",gridC).attr("stroke-width",1);
    svg.append("text").attr("x",cx+4).attr("y",cy-R*t+3).attr("font-size",9).attr("fill",mu).text(t*100);
  });
  // Axes
  d3.range(n).forEach(i=>{
    svg.append("line").attr("x1",cx).attr("y1",cy)
      .attr("x2",cx+R*Math.cos(angle(i))).attr("y2",cy+R*Math.sin(angle(i)))
      .attr("stroke",gridC).attr("stroke-width",1);
  });
  // Polygons
  function poly(data,col){
    const pts=data.map((v,i)=>[cx+R*(v/100)*Math.cos(angle(i)),cy+R*(v/100)*Math.sin(angle(i))]);
    svg.append("polygon").attr("points",pts.map(p=>p.join(",")).join(" "))
      .attr("fill",col).attr("fill-opacity",.18).attr("stroke",col).attr("stroke-width",2);
    pts.forEach(p=>svg.append("circle").attr("cx",p[0]).attr("cy",p[1]).attr("r",4).attr("fill",col));
  }
  poly(human,"#8B0000");poly(ai,"#8B7536");
  // Labels
  dims.forEach((d,i)=>{
    const lx=cx+(R+32)*Math.cos(angle(i)),ly=cy+(R+32)*Math.sin(angle(i));
    d.split("
").forEach((line,li)=>{
      svg.append("text").attr("x",lx).attr("y",ly+(li-.5)*13).attr("text-anchor","middle")
        .attr("font-size",11).attr("fill",fg).text(line);
    });
  });
  // Legend
  [["Human","#8B0000"],["AI","#8B7536"]].forEach(([l,c],i)=>{
    svg.append("circle").attr("cx",cx-50+i*80).attr("cy",H-30).attr("r",6).attr("fill",c).attr("fill-opacity",.7);
    svg.append("text").attr("x",cx-38+i*80).attr("y",H-26).attr("font-size",12).attr("fill",fg).text(l);
  });
}
draw();window.addEventListener("resize",draw);
</script></body></html>
