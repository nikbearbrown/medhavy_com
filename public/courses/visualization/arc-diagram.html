<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arc Diagram | Medhavy</title>
<meta name="description" content="Nodes arranged linearly with curved arcs above connecting related pairs. Arc height encodes the distance between nodes.">
<meta name="keywords" content="arc diagram, network graph, relationships, linear layout, D3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Arc Diagram</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",bg=dark?"#0D0D0D":"#E8E0D0",mu="#9C9680";
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const nodes=["Logic","Memory","Language","Pattern","Creativity","Empathy","Context","Judgment","Ethics","Vision"];
  const links=[[0,2],[0,9],[1,3],[1,6],[2,4],[2,7],[3,5],[3,8],[4,9],[5,6],[6,8],[7,9],[1,8],[0,5],[4,7]];
  const pad=Math.max(60,W*.08),baseline=H*.74;
  const x=d3.scalePoint().domain(d3.range(nodes.length)).range([pad,W-pad]).padding(.5);
  svg.append("text").attr("x",W/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu)
    .text("Arcs connect related cognitive concepts — height encodes distance between nodes");
  const maxD=nodes.length-1;
  links.forEach(([s,t])=>{
    const x1=x(s),x2=x(t),mid=(x1+x2)/2,dist=Math.abs(t-s);
    const h=(dist/maxD)*(baseline*.68);
    const col=d3.interpolateRgb("#8B0000","#8B7536")(dist/maxD);
    svg.append("path").attr("d","M"+x1+","+baseline+" Q"+mid+","+(baseline-h)+" "+x2+","+baseline)
      .attr("fill","none").attr("stroke",col).attr("stroke-width",1+dist*.13).attr("opacity",.7);
  });
  svg.selectAll("circle").data(nodes).enter().append("circle")
    .attr("cx",(_,i)=>x(i)).attr("cy",baseline).attr("r",5)
    .attr("fill","#8B0000").attr("stroke",bg).attr("stroke-width",2);
  svg.selectAll("text.lbl").data(nodes).enter().append("text").classed("lbl",true)
    .attr("x",(_,i)=>x(i)).attr("y",baseline+18).attr("text-anchor","middle")
    .attr("font-size",11).attr("fill",fg).text(d=>d);
}
draw();window.addEventListener("resize",draw);
</script></body></html>
