<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gantt Chart | Medhavy</title>
<meta name="description" content="A horizontal bar chart showing a project schedule. Tasks are plotted against time; bars show duration and overlap reveals parallelism.">
<meta name="keywords" content="Gantt chart, project timeline, schedule, D3, project management">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Gantt Chart</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
const tasks=[
  {k:"Problem Formulation",s:0,e:3,cat:0},{k:"Literature Review",s:1,e:5,cat:0},
  {k:"Methodology Design",s:3,e:7,cat:1},{k:"Data Collection",s:5,e:9,cat:1},
  {k:"AI Tool Setup",s:4,e:6,cat:2},{k:"Analysis",s:7,e:11,cat:1},
  {k:"Human Verification",s:9,e:13,cat:0},{k:"Report & Synthesis",s:11,e:16,cat:2}
];
const catColors=["#8B0000","#8B7536","#6B6B5E"];
const catLabels=["Human-led","Collaborative","Tool-led"];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:160,b:60,l:180};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scaleLinear().domain([0,16]).range([0,iW]);
  const y=d3.scaleBand().domain(tasks.map(d=>d.k)).range([0,iH]).padding(.3);
  const rH=y.bandwidth();
  // Grid
  d3.range(0,17,2).forEach(t=>{
    g.append("line").attr("x1",x(t)).attr("x2",x(t)).attr("y1",0).attr("y2",iH)
      .attr("stroke",gridC).attr("stroke-width",1);
  });
  // Bars
  tasks.forEach(d=>{
    const col=catColors[d.cat];
    g.append("rect").attr("x",x(d.s)).attr("y",y(d.k)).attr("width",x(d.e)-x(d.s))
      .attr("height",rH).attr("fill",col).attr("opacity",.75).attr("rx",3);
    const bw=x(d.e)-x(d.s);
    if(bw>40){
      g.append("text").attr("x",x(d.s)+bw/2).attr("y",y(d.k)+rH/2+4)
        .attr("text-anchor","middle").attr("font-size",10).attr("fill","#E8E0D0")
        .text((d.e-d.s)+" wks");
    }
  });
  // Axes
  g.append("g").attr("transform","translate(0,"+iH+")").call(
    d3.axisBottom(x).ticks(8).tickFormat(d=>"Wk "+d)).call(a=>{
    a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",10);a.selectAll(".tick line").attr("stroke",mu);
  });
  g.append("g").call(d3.axisLeft(y)).call(a=>{
    a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").remove();
  });
  // Legend
  catLabels.forEach((l,i)=>{
    svg.append("rect").attr("x",W-m.r+10).attr("y",m.t+i*22).attr("width",12).attr("height",12)
      .attr("fill",catColors[i]).attr("rx",2).attr("opacity",.75);
    svg.append("text").attr("x",W-m.r+28).attr("y",m.t+i*22+10).attr("font-size",11).attr("fill",fg).text(l);
  });
  svg.append("text").attr("x",(W-m.r+m.l)/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Research project timeline — color encodes task ownership");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
