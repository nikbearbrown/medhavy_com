<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stacked Bar Graph | Medhavy</title>
<meta name="description" content="Bars divided into segments to show both part-to-whole composition and the total simultaneously across categories.">
<meta name="keywords" content="stacked bar, composition, part to whole, D3, data visualization">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Stacked Bar Graph</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
const categories=["BotSpeak","Causal
Reasoning","Ethical
Play","AImagineering","Embodied
Teaching"];
const segments=[
  {k:"Claude tasks",vals:[65,45,30,70,20],col:"#8B7536"},
  {k:"Collaborative",vals:[20,30,35,20,30],col:"#6B6B5E"},
  {k:"Human-only",vals:[15,25,35,10,50],col:"#8B0000"}
];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:160,b:80,l:60};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scaleBand().domain(categories).range([0,iW]).padding(.28);
  const y=d3.scaleLinear().domain([0,100]).range([iH,0]);
  y.ticks(5).forEach(t=>{g.append("line").attr("x1",0).attr("x2",iW).attr("y1",y(t)).attr("y2",y(t)).attr("stroke",gridC).attr("stroke-width",1);});
  // Stack
  const totals=categories.map((_,i)=>0);
  segments.forEach(seg=>{
    seg.vals.forEach((v,i)=>{
      g.append("rect").attr("x",x(categories[i])).attr("y",y(totals[i]+v)).attr("width",x.bandwidth())
        .attr("height",y(totals[i])-y(totals[i]+v)).attr("fill",seg.col).attr("rx",2).attr("opacity",.82);
      if(v>8){
        g.append("text").attr("x",x(categories[i])+x.bandwidth()/2)
          .attr("y",y(totals[i]+v/2)+4).attr("text-anchor","middle").attr("font-size",10)
          .attr("fill","#E8E0D0").text(v+"%");
      }
      totals[i]+=v;
    });
  });
  g.append("g").attr("transform","translate(0,"+iH+")").call(d3.axisBottom(x).tickFormat(d=>d.replace("
"," "))).call(a=>{
    a.select(".domain").attr("stroke",mu);
    a.selectAll("text").attr("fill",fg).attr("font-size",10).attr("transform","rotate(-15)").style("text-anchor","end").attr("dx","-.4em").attr("dy",".1em");
    a.selectAll(".tick line").attr("stroke",mu);
  });
  g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d=>d+"%")).call(a=>{a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").attr("stroke",mu);});
  segments.forEach((s,i)=>{
    svg.append("rect").attr("x",W-m.r+10).attr("y",m.t+i*22).attr("width",12).attr("height",12).attr("fill",s.col).attr("rx",2).attr("opacity",.82);
    svg.append("text").attr("x",W-m.r+28).attr("y",m.t+i*22+10).attr("font-size",11).attr("fill",fg).text(s.k);
  });
  svg.append("text").attr("x",(W-m.r+m.l)/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Task distribution by course — proportion of Claude, collaborative, and human-only work");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
