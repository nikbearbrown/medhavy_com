<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Span Chart | Medhavy</title>
<meta name="description" content="Shows the range of values for each category with a line from minimum to maximum. A dot marks the average. Good for showing variability.">
<meta name="keywords" content="span chart, range chart, min max, variability, D3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,sans-serif;background:#E8E0D0;color:#0D0D0D}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:rgba(232,224,208,.94);
backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.09);
display:flex;align-items:center;justify-content:space-between;padding:0 24px}
nav a{font-size:13px;color:#4A4A4A;text-decoration:none;font-weight:500}
nav a:hover{color:#0D0D0D}.nt{font-size:13px;color:#6B6B5E}.nc{font-size:12px;color:#9C9680}
.nc a{color:#9C9680;text-decoration:none}.nc a:hover{color:#4A4A4A}
#viz{position:fixed;top:44px;left:0;right:0;bottom:0;overflow:hidden}

@media(prefers-color-scheme:dark){
body{background:#0D0D0D;color:#E8E0D0}
nav{background:rgba(13,13,13,.94);border-color:rgba(255,255,255,.07)}
nav a{color:#9C9680}nav a:hover{color:#E8E0D0}}
</style></head><body>
<nav><a href="/">&#8592; Medhavy</a><span class="nt">Span Chart</span>
<span class="nc">Built with <a href="https://d3js.org" target="_blank" rel="noopener">D3.js</a></span></nav>
<div id="viz"></div><script>
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
const fg=dark?"#E8E0D0":"#0D0D0D",mu="#9C9680",gridC=dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)";
const data=[
  {k:"Plausibility Auditing",min:55,avg:74,max:92},{k:"Problem Formulation",min:48,avg:68,max:85},
  {k:"Tool Orchestration",min:42,avg:65,max:88},{k:"Interpretive Judgment",min:38,avg:58,max:80},
  {k:"Executive Integration",min:30,avg:52,max:78},{k:"Creative Synthesis",min:45,avg:70,max:90}
];
function draw(){
  d3.select("#viz svg").remove();
  const el=document.getElementById("viz"),W=el.clientWidth,H=el.clientHeight;
  const m={t:60,r:40,b:60,l:190};
  const iW=W-m.l-m.r,iH=H-m.t-m.b;
  const svg=d3.select("#viz").append("svg").attr("width",W).attr("height",H);
  const g=svg.append("g").attr("transform","translate("+m.l+","+m.t+")");
  const x=d3.scaleLinear().domain([0,100]).range([0,iW]);
  const y=d3.scaleBand().domain(data.map(d=>d.k)).range([0,iH]).padding(.35);
  [20,40,60,80,100].forEach(t=>{g.append("line").attr("x1",x(t)).attr("x2",x(t)).attr("y1",0).attr("y2",iH).attr("stroke",gridC).attr("stroke-width",1);});
  data.forEach((d,i)=>{
    const cy=y(d.k)+y.bandwidth()/2;
    // Range line
    g.append("line").attr("x1",x(d.min)).attr("x2",x(d.max)).attr("y1",cy).attr("y2",cy)
      .attr("stroke","#8B0000").attr("stroke-width",2.5).attr("stroke-linecap","round");
    // End caps
    [-1,1].forEach(s=>{
      const xv=s<0?d.min:d.max;
      g.append("line").attr("x1",x(xv)).attr("x2",x(xv)).attr("y1",cy-7).attr("y2",cy+7)
        .attr("stroke","#8B0000").attr("stroke-width",2);
    });
    // Average dot
    g.append("circle").attr("cx",x(d.avg)).attr("cy",cy).attr("r",6)
      .attr("fill","#8B0000").attr("stroke",dark?"#0D0D0D":"#E8E0D0").attr("stroke-width",2);
    // Labels
    g.append("text").attr("x",x(d.min)-6).attr("y",cy+4).attr("text-anchor","end")
      .attr("font-size",10).attr("fill",mu).text(d.min);
    g.append("text").attr("x",x(d.max)+6).attr("y",cy+4).attr("font-size",10).attr("fill",mu).text(d.max);
    g.append("text").attr("x",x(d.avg)).attr("y",cy-11).attr("text-anchor","middle")
      .attr("font-size",9).attr("fill",fg).text("avg "+d.avg);
  });
  g.append("g").attr("transform","translate(0,"+iH+")").call(d3.axisBottom(x).ticks(5)).call(a=>{a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").attr("stroke",mu);});
  g.append("g").call(d3.axisLeft(y)).call(a=>{a.select(".domain").attr("stroke",mu);a.selectAll("text").attr("fill",fg).attr("font-size",11);a.selectAll(".tick line").remove();});
  svg.append("text").attr("x",(W+m.l-m.r)/2).attr("y",32).attr("text-anchor","middle")
    .attr("font-size",12).attr("fill",mu).text("Score ranges by supervisory capacity — dot = average, caps = min and max");
}
draw();window.addEventListener("resize",draw);
</script></body></html>
